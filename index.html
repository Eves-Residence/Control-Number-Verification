<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eves Residences | Verification Portal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #007bff;
            --dark: #343a40;
            --bg: #f8f9fa;
            --footer-text: #6c757d;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .main-content {
            flex: 1 0 auto;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            text-align: center; 
        }

        h2 { color: var(--dark); margin-bottom: 20px; font-size: 1.5rem; }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 18px;
            text-align: center;
            text-transform: uppercase;
            outline: none;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }

        button { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: 600; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-verify { background: var(--primary); color: white; }
        .btn-scan { background: var(--dark); color: white; }

        /* IMPROVED SCANNER STYLING */
        #reader { 
            width: 100%; 
            margin-top: 15px; 
            display: none; 
            border-radius: 12px; 
            overflow: hidden;
            border: 3px solid var(--primary);
            background: #000;
        }

        #result { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 12px; 
            display: none; 
            line-height: 1.6;
        }

        .valid { background: #e7f4e4; color: #1e4620; border: 1px solid #c3e6cb; }
        .invalid { background: #fdf2f2; color: #721c24; border: 1px solid #f5c2c7; }
        .searching { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }

        /* Virtual Keyboard */
        #keyboard {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: #d1d4d9;
            padding: 10px 0 30px 0;
            transition: bottom 0.3s ease;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            padding-inline: 6px;
            box-sizing: border-box;
            z-index: 1000;
        }

        #keyboard.open { bottom: 0; }

        .key {
            background: white;
            padding: 15px 0;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
        }

        .key:active { background: #adb5bd; }
        .key.done { background: var(--primary); color: white; grid-column: span 2; }

        footer {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            font-size: 12px;
            color: var(--footer-text);
        }
    </style>
</head>
<body>

<div class="main-content">
    <div class="card">
        <img src="https://img.icons8.com/fluency/96/verified-badge.png" alt="Logo" width="50">
        <h2>Tenant Verification</h2>
        
        <input type="text" id="hashInput" placeholder="ENTER OR PASTE CODE">
        
        <div class="btn-group">
            <button class="btn-verify" onclick="callApi()">Verify Code</button>
            <button class="btn-scan" id="scanBtn" onclick="toggleScanner()">📷 Open Scanner</button>
        </div>
        
        <div id="reader"></div>
        <div id="result"></div>
    </div>
</div>

<footer>
    Powered by <strong>Eve's Residences IT Department</strong><br>
    All Rights Reserved &copy; 2026
</footer>

<div id="keyboard">
    <div class="key" onclick="press('1')">1</div>
    <div class="key" onclick="press('2')">2</div>
    <div class="key" onclick="press('3')">3</div>
    <div class="key" onclick="press('4')">4</div>
    <div class="key" onclick="press('5')">5</div>
    <div class="key" onclick="press('6')">6</div>
    <div class="key" onclick="press('7')">7</div>
    <div class="key" onclick="press('8')">8</div>
    <div class="key" onclick="press('9')">9</div>
    <div class="key" onclick="press('0')">0</div>
    <div class="key" onclick="press('A')">A</div>
    <div class="key" onclick="press('B')">B</div>
    <div class="key" onclick="press('C')">C</div>
    <div class="key" onclick="press('D')">D</div>
    <div class="key" onclick="press('E')">E</div>
    <div class="key" onclick="press('F')">F</div>
    <div class="key" onclick="press('back')">⌫</div>
    <div class="key done" onclick="closeKeyboard()">DONE</div>
</div>

<script>
    const API_RESERVATION = "https://script.google.com/macros/s/AKfycbxNfr5IOQNATSszwCp-9I2QJ4lQtASBxI_s2ia8zEiYxKAI3tg0_c3pnsT_7K-kDkPF_A/exec";
    const API_RENEWAL = "https://script.google.com/macros/s/AKfycbx9-8yCnVZM5nEEIYwBNyIEGl-mClnV84aS5ACw4tMdAT5LnO11mc5BJMCdZ5qGRQIf/exec";
    
    // Global Scanner Config
    let scanner = null;
    const input = document.getElementById('hashInput');
    const kb = document.getElementById('keyboard');

    input.addEventListener('click', () => { if (window.innerWidth < 768) kb.classList.add('open'); });
    function press(key) { if (key === 'back') { input.value = input.value.slice(0, -1); } else { if(input.value.length < 16) input.value += key; } }
    function closeKeyboard() { kb.classList.remove('open'); }

    async function callApi(code) {
        const hash = (code || input.value).trim().toUpperCase();
        if(!hash) return;
        
        closeKeyboard();
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = "block";
        resultDiv.className = "searching";
        resultDiv.innerHTML = "Searching...";

        try {
            let response = await fetch(`${API_RESERVATION}?hash=${hash}`);
            let data = await response.json();

            if (!data.valid) {
                response = await fetch(`${API_RENEWAL}?hash=${hash}`);
                data = await response.json();
            }

            if (data.valid) {
                resultDiv.className = "valid";
                resultDiv.innerHTML = `<strong>✅ VERIFIED</strong><br>Tenant: ${data.name}<br>Unit: ${data.unit}<br>Property: ${data.property}`;
            } else {
                resultDiv.className = "invalid";
                resultDiv.innerHTML = "<strong>❌ NOT FOUND</strong><br>Invalid or expired code.";
            }
        } catch (err) {
            resultDiv.className = "invalid";
            resultDiv.innerHTML = "⚠️ Connection Error.";
        }
    }

    function toggleScanner() {
        const readerDiv = document.getElementById('reader');
        const btn = document.getElementById('scanBtn');

        if (scanner) {
            scanner.stop().then(() => {
                scanner = null;
                readerDiv.style.display = "none";
                btn.innerHTML = "📷 Open Scanner";
                btn.style.background = "var(--dark)";
            });
        } else {
            closeKeyboard();
            readerDiv.style.display = "block";
            btn.innerHTML = "🛑 Stop Scanner";
            btn.style.background = "#dc3545";

            scanner = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 300, height: 150 }, // Optimized for rectangle barcodes
                aspectRatio: 1.0 
            };

            scanner.start(
                { facingMode: "environment" }, 
                config, 
                (text) => {
                    input.value = text;
                    callApi(text);
                    toggleScanner(); // Auto-close on success
                }
            ).catch(err => {
                console.error(err);
                alert("Camera access denied or not found.");
                toggleScanner();
            });
        }
    }
</script>

</body>
</html>
